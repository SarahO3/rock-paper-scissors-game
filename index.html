<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock, Paper, Scissors Game</title>
</head>
<body>

  <div class="container">

    <!-- buttons -->
    <button id="rock">Rock</button>
    <button id="paper">Paper</button>
    <button id="scissors">Scissors</button>

    <div id="result"></div>
    <div id="score">Score: 0 - 0</div>

    <p id="para"></p>
    <button id="resetBtn">Reset Game</button>

  </div>

<script>
let humanScore = 0;
let computerScore = 0;

const resultDiv = document.getElementById("result");
const scoreDiv = document.getElementById("score");
const para = document.getElementById("para");
const resetBtn = document.getElementById("resetBtn");

const buttons = document.querySelectorAll("#rock, #paper, #scissors");

// ✅ Random color generator
function getRandomColor(){
  const r = Math.floor(Math.random() * 256);
  const g = Math.floor(Math.random() * 256);
  const b = Math.floor(Math.random() * 256);

  return `rgb(${r}, ${g}, ${b})`;
}

// ✅ Hover effect
buttons.forEach(button => {
  button.addEventListener("mouseenter", () => {
    button.style.backgroundColor = getRandomColor();
  });

  button.addEventListener("mouseleave", () => {
    button.style.backgroundColor = "";
  });
});

// ✅ Click event
buttons.forEach(button => {
  button.addEventListener("click", () => {
    
    const human = button.id;
    const choices = ["rock", "paper", "scissors"];
    const computer = choices[Math.floor(Math.random() * 3)];

    let result = "";

    if (human === computer) {
      result = "Draw";
      resultDiv.style.color = "gray";
    } else if (
      (human === "rock" && computer === "scissors") ||
      (human === "paper" && computer === "rock") ||
      (human === "scissors" && computer === "paper")
    ) {
      humanScore++;
      result = "You win!";
      resultDiv.style.color = "green";
    } else {
      computerScore++;
      result = "You lose!";
      resultDiv.style.color = "red";
    }

    resultDiv.textContent =
      `You: ${human} | Computer: ${computer} → ${result}`;

    scoreDiv.textContent =
      `Human Score: ${humanScore} - Computer Score: ${computerScore}`;

    // ✅ Check winner and disable buttons
    if (humanScore === 5 || computerScore === 5) {
      resultDiv.textContent = humanScore === 5 
        ? "🎉 You won the game!" 
        : "😢 Computer won the game!";

      buttons.forEach(btn => {
        btn.disabled = true;
      });

      para.textContent = "Click the reset button to play again.";
    }

  });
});

// ✅ Reset button
resetBtn.addEventListener("click", () => {
  humanScore = 0;
  computerScore = 0;

  scoreDiv.textContent = "Score: 0 - 0";
  resultDiv.textContent = "";
  para.textContent = "";

  // Enable buttons again
  buttons.forEach(btn => {
    btn.disabled = false;
  });
});

</script>

</body>
</html>
